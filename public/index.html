<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLSU Library System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f8b9d">
  </head>
  <body class="auth-page">
    <main class="auth-shell landing-shell">
      <section class="auth-brand">
        <h1>MLSU Library</h1>
        <p>Smart barcode-based library management for students and librarians.</p>
        <div class="feature-chips" aria-label="Library features">
          <span>Barcode Issue</span>
          <span>Smart Catalog</span>
          <span>Due Reminders</span>
          <span>Penalty Tracking</span>
        </div>
      </section>
      <section class="auth-card">
        <h2>Enter the library</h2>
        <div class="form-grid">
          <a class="btn btn-primary" href="login.html">Login</a>
          <a class="btn btn-muted" href="signup.html">Student Signup</a>
        </div>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module" src="./js/push-notifications.js"></script>
  </body>
</html>
