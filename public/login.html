<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Login | Mohanlal Sukhadia University LMS</title>
    <link rel="icon" type="image/png" href="/assets/mlsu-logo.png?v=3">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F766E">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand">
        <h1>Mohanlal Sukhadia University LMS</h1>
        <p>Open the correct dashboard for your role.</p>
      </section>
      <section class="auth-card">
        <h2>Login</h2>
        <div id="authMessage" class="auth-message" aria-live="polite"></div>
        <form id="loginForm" class="form-grid">
          <label>Email<input id="email" type="email" autocomplete="email" required></label>
          <label>Password
            <div class="password-field">
              <input id="password" type="password" autocomplete="current-password" required>
              <button class="btn btn-muted password-toggle" type="button" data-target="password">Show</button>
            </div>
          </label>
          <div class="toolbar">
            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn btn-muted" href="signup.html">Create Account</a>
          </div>
        </form>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="./js/pwa.js" defer></script>
    <script type="module" src="./js/push-notifications.js"></script>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
