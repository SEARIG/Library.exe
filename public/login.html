<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | ULC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f8b9d">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand">
        <h1>Welcome back</h1>
        <p>Open the correct ULC dashboard for your role and assigned organization.</p>
      </section>
      <section class="auth-card">
        <h2>Login</h2>
        <div id="authMessage" class="auth-message" aria-live="polite"></div>
        <form id="loginForm" class="form-grid">
          <label>Email<input id="email" type="email" autocomplete="email" required></label>
          <label>Password
            <div class="password-field">
              <input id="password" type="password" autocomplete="current-password" required>
              <button class="btn btn-muted password-toggle" type="button" data-target="password">Show</button>
            </div>
          </label>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <p class="link-line">New organization? <a href="register.html">Start subscription</a></p>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module" src="./js/push-notifications.js"></script>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
