<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Organization | ULC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12201b">
  </head>
  <body class="ulc-page">
    <header class="ulc-topbar">
      <a class="ulc-brand" href="index.html">ULC</a>
      <nav class="ulc-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </header>
    <main class="ulc-workspace">
      <section class="ulc-section-head">
        <p class="eyebrow">Organization onboarding</p>
        <h1>Start a ULC subscription</h1>
        <p>Choose your organization type, estimate billing, complete payment, and create the first admin account.</p>
      </section>

      <form id="registrationForm" class="ulc-form-shell">
        <fieldset class="ulc-card">
          <legend>Organization</legend>
          <div class="segmented-control" role="radiogroup" aria-label="Organization type">
            <label><input type="radio" name="orgType" value="university" checked><span>University</span></label>
            <label><input type="radio" name="orgType" value="independent_college"><span>Independent College</span></label>
            <label><input type="radio" name="orgType" value="private_library"><span>Private Library</span></label>
          </div>
          <div class="form-grid two-col">
            <label>Organization Name<input id="organizationName" required autocomplete="organization"></label>
            <label>Email<input id="email" type="email" required autocomplete="email"></label>
            <label>Phone<input id="phone" type="tel" required autocomplete="tel"></label>
            <label>Authorized Person<input id="authorizedPerson" required autocomplete="name"></label>
            <label class="span-2">Address<textarea id="address" rows="3" required></textarea></label>
          </div>
        </fieldset>

        <fieldset class="ulc-card">
          <legend>Plan</legend>
          <div class="segmented-control" role="radiogroup" aria-label="Plan type">
            <label><input type="radio" name="planType" value="unlimited" checked><span>Unlimited Plan</span></label>
            <label><input type="radio" name="planType" value="custom"><span>Custom Plan</span></label>
          </div>
          <div class="form-grid two-col">
            <label>Book Count<input id="bookCount" type="number" min="0" value="1000"></label>
            <label>Student / Member Count<input id="studentCount" type="number" min="0" value="1000"></label>
            <label>Billing Cycle
              <select id="billingCycle">
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly - 10% discount</option>
              </select>
            </label>
            <div class="price-panel" aria-live="polite">
              <span>Estimated amount</span>
              <strong id="pricePreview">₹6,999/month</strong>
            </div>
          </div>
        </fieldset>

        <fieldset class="ulc-card">
          <legend>Main Admin</legend>
          <div class="form-grid two-col">
            <label>Admin Name<input id="adminName" required autocomplete="name"></label>
            <label>Admin Email<input id="adminEmail" type="email" required autocomplete="email"></label>
            <label>Admin Phone<input id="adminPhone" type="tel" required autocomplete="tel"></label>
            <label>Password<input id="adminPassword" type="password" minlength="8" required autocomplete="new-password"></label>
          </div>
        </fieldset>

        <div class="ulc-submit-row">
          <div id="registrationStatus" class="auth-message" aria-live="polite"></div>
          <button class="btn btn-primary" type="submit">Create Subscription</button>
        </div>
      </form>
    </main>
    <div id="toast" class="toast"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="./js/ulc-register.js"></script>
  </body>
</html>
