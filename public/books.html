<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Books | Mohanlal Sukhadia University LMS</title>
    <link rel="icon" type="image/png" href="./assets/mlsu-logo.png?v=2">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f8b9d">
  </head>
  <body class="protected-page">
    <header class="app-header">
      <div class="header-inner">
        <a class="brand" href="index.html">
          <img src="./assets/mlsu-logo.png?v=2" alt="Mohanlal Sukhadia University LMS Logo" class="nav-logo">
          <span>Mohanlal Sukhadia University LMS</span>
        </a>
        <div class="nav-skeleton"><span></span><span></span><span></span></div>
      </div>
    </header>
    <main class="app-main">
      <section class="page-title">
        <h1>Books</h1>
        <p>Add book records, barcode values, shelf locations, and availability status.</p>
      </section>
      <section class="dashboard-grid">
        <article class="panel span-4">
          <h2>Add or Update Book</h2>
          <form id="bookForm" class="form-grid">
            <label>Book ID<input id="bookId" required></label>
            <label>Serial No.<input id="serialNo"></label>
            <label>Barcode Value<input id="barcodeValue"></label>
            <label>Title<input id="title" required></label>
            <label>Author<input id="author"></label>
            <label>Category<input id="category"></label>
            <label>Image URL<input id="imageUrl" type="url"></label>
            <label>Shelf Location<input id="shelfLocation"></label>
            <label>Status
              <select id="status">
                <option value="available">available</option>
                <option value="issued">issued</option>
                <option value="lost">lost</option>
                <option value="damaged">damaged</option>
              </select>
            </label>
            <button class="btn btn-primary" type="submit">Save Book</button>
          </form>
        </article>
        <article class="panel span-8">
          <h2>Library Catalog</h2>
          <div id="booksTable" class="table-wrap"></div>
        </article>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module" src="./js/books.js"></script>
  </body>
</html>
