<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Signup | ULC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f8b9d">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand">
        <h1>Student signup</h1>
        <p>Create your student profile before requesting book issues through barcode scanning.</p>
      </section>
      <section class="auth-card">
        <h2>Create account</h2>
        <div id="authMessage" class="auth-message" aria-live="polite"></div>
        <form id="signupForm" class="form-grid two-col">
          <label>Name<input id="name" required></label>
          <label>Email<input id="email" type="email" autocomplete="email" required></label>
          <label>Phone<input id="phone" type="tel" required></label>
          <label>Department<input id="department" required></label>
          <label>Year<input id="year" required></label>
          <label>Roll Number<input id="rollNumber" required></label>
          <label>Password
            <div class="password-field">
              <input id="password" type="password" autocomplete="new-password" minlength="6" required>
              <button class="btn btn-muted password-toggle" type="button" data-target="password">Show</button>
            </div>
          </label>
          <button class="btn btn-primary" type="submit">Create Student Account</button>
        </form>
        <p class="link-line">Registering an organization? <a href="register.html">Start subscription</a></p>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module" src="./js/push-notifications.js"></script>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
