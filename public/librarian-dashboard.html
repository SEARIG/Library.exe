<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Librarian Dashboard | MLSU Library</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a class="brand" href="librarian-dashboard.html">MLSU Library</a>
        <nav class="nav">
          <a href="librarian-dashboard.html">Dashboard</a>
          <a href="books.html">Books</a>
          <a href="scan-book.html?mode=return">Return Scan</a>
          <span class="user-chip"><span id="currentUserName"></span><span class="badge" id="currentUserRole"></span></span>
          <button id="signOutBtn">Sign Out</button>
        </nav>
      </div>
    </header>
    <main class="app-main">
      <section class="page-title">
        <h1>Librarian Dashboard</h1>
        <p>Review pending issue requests, verify availability, and process returns.</p>
      </section>
      <section class="dashboard-grid">
        <article class="panel span-8">
          <h2>Pending Requests</h2>
          <div id="pendingRequests" class="list-stack"></div>
        </article>
        <article class="panel span-4">
          <h2>Quick Return</h2>
          <form id="quickReturnForm" class="form-grid">
            <label>Book Barcode<input id="quickReturnBookId" required></label>
            <button class="btn btn-primary" type="submit">Return</button>
          </form>
        </article>
        <article class="panel span-6">
          <h2>Active Issues</h2>
          <div id="activeIssues" class="list-stack"></div>
        </article>
        <article class="panel span-6">
          <h2>Recent Students</h2>
          <div id="recentStudents" class="list-stack"></div>
        </article>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module" src="js/librarian-dashboard.js"></script>
  </body>
</html>
